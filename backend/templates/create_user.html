<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IT Admin Panel - Create User</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 40px auto; padding: 20px; }
        h1 { margin-bottom: 10px; }
        nav a { margin-right: 16px; text-decoration: none; color: #0066cc; }
        .message { background: #e6f4ea; border: 1px solid #34a853; padding: 10px; margin: 12px 0; border-radius: 4px; }
        label { display: block; margin-top: 14px; font-weight: bold; }
        input[type="text"], input[type="email"] { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; }
        button { padding: 10px 20px; margin-top: 20px; background: #0066cc; color: white; border: none; cursor: pointer; font-size: 15px; }
        button:hover { background: #0055aa; }
    </style>
</head>
<body>
    <h1>Create New User</h1>
    <nav>
        <a href="/users">All Users</a>
        <a href="/create-user">Create User</a>
    </nav>

    {% if message %}
    <div class="message">{{ message }}</div>
    {% endif %}

    <form method="post" action="/create-user">
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" placeholder="user@company.com" required>

        <label for="full_name">Full Name</label>
        <input type="text" id="full_name" name="full_name" placeholder="John Doe" required>

        <button type="submit">Create User</button>
    </form>
</body>
</html>
