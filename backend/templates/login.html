<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IT Admin Panel - Login</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 80px auto; padding: 20px; }
        h1 { text-align: center; }
        label { display: block; margin-top: 12px; font-weight: bold; }
        input { width: 100%; padding: 8px; margin-top: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; margin-top: 20px; background: #0066cc; color: white; border: none; cursor: pointer; font-size: 16px; }
        button:hover { background: #0055aa; }
    </style>
</head>
<body>
    <h1>IT Admin Panel</h1>
    <form method="post" action="/login">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" value="admin" required>

        <label for="password">Password</label>
        <input type="password" id="password" name="password" value="admin" required>

        <button type="submit">Sign In</button>
    </form>
</body>
</html>
