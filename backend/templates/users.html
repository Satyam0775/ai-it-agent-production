<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>IT Admin Panel - Users</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 700px; margin: 40px auto; padding: 20px; }
        h1 { margin-bottom: 10px; }
        nav a { margin-right: 16px; text-decoration: none; color: #0066cc; }
        .message { background: #e6f4ea; border: 1px solid #34a853; padding: 10px; margin: 12px 0; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 8px 12px; text-align: left; }
        th { background: #f0f0f0; }
        form.inline { display: inline; }
        button { padding: 4px 10px; cursor: pointer; }
        .reset-btn { background: #ff9900; color: white; border: none; }
        .reset-btn:hover { background: #e68900; }
    </style>
</head>
<body>
    <h1>User Management</h1>
    <nav>
        <a href="/users">All Users</a>
        <a href="/create-user">Create User</a>
    </nav>

    {% if message %}
    <div class="message">{{ message }}</div>
    {% endif %}

    <table>
        <thead>
            <tr>
                <th>Email</th>
                <th>Full Name</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user.email }}</td>
                <td>{{ user.full_name }}</td>
                <td>
                    <form class="inline" method="post" action="/reset-password">
                        <input type="hidden" name="email" value="{{ user.email }}">
                        <button class="reset-btn" type="submit">Reset Password</button>
                    </form>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="3">No users found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
